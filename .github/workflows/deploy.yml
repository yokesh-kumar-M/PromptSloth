name: Deploy PromptEnhancer Pro

on:
  push:
    branches:
      - main
      - master

jobs:
  build-extension:
    name: Build Chrome Extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: extension-react/package-lock.json

      - name: Install Dependencies
        working-directory: extension-react
        run: npm ci

      - name: Build Extension
        working-directory: extension-react
        run: npm run build

      - name: Zip Extension
        run: |
          cd extension-react/dist
          zip -r ../../prompt-enhancer-pro.zip .
          
      - name: Upload Extension Artifact
        uses: actions/upload-artifact@v4
        with:
          name: prompt-enhancer-pro-extension
          path: prompt-enhancer-pro.zip

  test-backend:
    name: Test Django Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django Checks
        env:
          GEMINI_API_KEY: "test-key-placeholder"
        run: |
          python manage.py check
          python manage.py makemigrations --check --dry-run
